minimumReleaseAgeExclude:
  - '@astrojs/markdown-satteri@0.3.1 || 0.3.3'
  - astro@7.0.0 || 7.0.6
  - '@astrojs/vercel@11.0.0 || 11.0.2'
  - '@astrojs/internal-helpers@0.10.1'

shellEmulator: true
trustPolicy: no-downgrade
trustPolicyExclude:
  - cached-factory
  - chokidar
  - nanoid

allowBuilds:
  esbuild: true
  sharp: true
