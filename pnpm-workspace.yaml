shellEmulator: true
trustPolicy: no-downgrade
trustPolicyExclude:
  - cached-factory
  - vite
  - chokidar

allowBuilds:
  esbuild: true
  sharp: true

overrides:
  brace-expansion: '>=5.0.6'
  cross-spawn: '>=7.0.6'
  devalue: '>=5.8.1'
  esbuild: ^0.28.1
  fast-uri: '>=3.1.2'
  flatted: '>=3.4.2'
  h3: '>=1.15.11'
  lodash: '>=4.18.1'
  minimatch: '>=10.2.5'
  path-to-regexp: 6.3.0
  picomatch: '>=4.0.4'
  postcss: '>=8.5.10'
  smol-toml: '>=1.6.1'
  tar: '>=7.5.16'
  yaml: '>=2.9.0'
