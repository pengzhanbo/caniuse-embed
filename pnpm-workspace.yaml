shellEmulator: true
trustPolicy: no-downgrade
trustPolicyExclude:
  - cached-factory
  - vite
  - chokidar

allowBuilds:
  esbuild: true
  sharp: true

overrides:
  brace-expansion: '>=5.0.5'
  cross-spawn: '>=7.0.6'
  devalue: '>=5.8.0'
  esbuild: ^0.28.0
  flatted: '>=3.4.2'
  h3: '>=1.15.11'
  lodash: '>=4.18.1'
  minimatch: '>=10.2.5'
  path-to-regexp: 6.3.0
  picomatch: '>=4.0.4'
  smol-toml: '>=1.6.1'
  tar: '>=7.5.14'
  yaml: '>=2.8.4'
